services:
  api-bun:
    build:
      context: ./../api-bun
      dockerfile: Dockerfile
    container_name: zapi-api-bun
    environment:
      - DATABASE_URL=postgresql://meuuser:minhasenha@zapi-postgres:5432/zippyzap
      - PORT=8080
      - REDIS_HOST=zapi-redis
      - REDIS_PORT=6379
      - REDIS_USER=
      - REDIS_PASS=
      - JWT_SECRET=ksjbjacbajksbcjkab
      - JWT_EXPIRE=8
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-'your-mercadopago-access-token'}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-'your-webhook-secret-from-mercadopago'}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=http://localhost:8080
      - WUZAPI_BASE_URL=http://zapi-wuzapi:8080
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_WEBHOOK_URL=http://zapi-api-bun:8080/webhooks/wuzapi
      - THROTTLE_PUBLIC_TTL=60000
      - THROTTLE_PUBLIC_LIMIT=20
      - THROTTLE_TTL=60000
      - THROTTLE_LIMIT=60
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@example.com}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - wuzapi
    restart: unless-stopped

  wuzapi:
    image: asternic/wuzapi
    container_name: zapi-wuzapi
    ports:
      - "8082:8080"
    environment:
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      - WUZAPI_GLOBAL_HMAC_KEY=${WUZAPI_GLOBAL_HMAC_KEY}
      - DB_USER=${WUZAPI_DB_USER:-wuzapi}
      - DB_PASSWORD=${WUZAPI_DB_PASSWORD:-wuzapi}
      - DB_NAME=${WUZAPI_DB_NAME:-wuzapi}
      - DB_HOST=${WUZAPI_DB_HOST:-zapi-postgres}
      - DB_PORT=${WUZAPI_DB_PORT:-5432}
      - TZ=America/Sao_Paulo
    volumes:
      - ./.data/wuzapi/dbdata:/app/dbdata
      - ./.data/wuzapi/files:/app/files
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: zapi-postgres
    environment:
      POSTGRES_USER: meuuser
      POSTGRES_PASSWORD: minhasenha
      POSTGRES_DB: zippyzap
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zapi-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
