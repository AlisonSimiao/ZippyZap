services:
  api-bun:
    build:
      context: ./../api-bun
      dockerfile: Dockerfile
    container_name: zapi-api-bun
    environment:
      - DATABASE_URL=postgresql://meuuser:minhasenha@zapi-postgres:5432/zippyzap
      - PORT=8080
      - REDIS_HOST=zapi-redis
      - REDIS_PORT=6379
      - REDIS_USER=
      - REDIS_PASS=
      - JWT_SECRET=ksjbjacbajksbcjkab
      - JWT_EXPIRE=8
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-'your-mercadopago-access-token'}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:-'your-webhook-secret-from-mercadopago'}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=http://localhost:8080
      - WHATSAPP_MANAGER_URL=http://zapi-whatsapp-manager:8090
      - WUZAPI_BASE_URL=http://zapi-wuzapi:8080
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_WEBHOOK_URL=http://zapi-api-bun:8080/webhooks/wuzapi
      - THROTTLE_PUBLIC_TTL=60000
      - THROTTLE_PUBLIC_LIMIT=20
      - THROTTLE_TTL=60000
      - THROTTLE_LIMIT=60
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@example.com}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - whatsapp-manager
    restart: unless-stopped

  # whatsapp-manager: Go-based WhatsApp session manager using Whatsmeow
  whatsapp-manager:
    build:
      context: ./../whatsapp-manager
      dockerfile: Dockerfile
    container_name: zapi-whatsapp-manager
    environment:
      - WEBHOOK_URL=http://zapi-api-bun:8080/webhooks/whatsapp-manager
    ports:
      - "8090:8090"
    volumes:
      - ./.data/whatsapp-manager:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: zapi-postgres
    environment:
      POSTGRES_USER: meuuser
      POSTGRES_PASSWORD: minhasenha
      POSTGRES_DB: zippyzap
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zapi-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
